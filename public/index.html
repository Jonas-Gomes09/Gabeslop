<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Bootstrap</title>
    
    <!-- 1. IMPORTAR CSS DO BOOTSTRAP -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body>

    <!-- ESTRUTURA DO CAROUSEL -->
    <div id="meuCarrossel" class="carousel slide" data-bs-ride="carousel">
        
        <!-- Indicadores (Bolinhas de navegação) -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#meuCarrossel" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>

        <!-- Conteúdo dos Slides (Imagens) -->
        <div class="carousel-inner">
            <!-- Slide 1 (Obrigatório ter a classe 'active') -->
            <div class="carousel-item active">
                <img src="https://placeholder.com" class="d-block w-100" alt="Primeiro Slide">
            </div>
            <!-- Slide 2 -->
            <div class="carousel-item">
                <img src="https://placeholder.com" class="d-block w-100" alt="Segundo Slide">
            </div>
            <!-- Slide 3 -->
            <div class="carousel-item">
                <img src="https://placeholder.com" class="d-block w-100" alt="Terceiro Slide">
            </div>
        </div>

        <!-- Botões de Controle (Anterior e Próximo) -->
        <button class="carousel-control-prev" type="button" data-bs-target="#meuCarrossel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#meuCarrossel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
        </button>
    </div>

    <!-- 2. IMPORTAR JS DO BOOTSTRAP (Inclui o Popper necessário para o funcionamento) -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
